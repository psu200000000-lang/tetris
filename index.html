<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테트리스 게임</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: Arial, sans-serif;
        }

        .container {
            display: flex;
            gap: 30px;
            background: rgba(0, 0, 0, 0.3);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .game-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        canvas {
            border: 3px solid #00ff00;
            background-color: #000;
            display: block;
            image-rendering: pixelated;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .info-section {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #00ff00;
            color: #00ff00;
            font-size: 16px;
            text-align: center;
        }

        .info-item {
            margin: 15px 0;
            padding: 10px;
            background: rgba(0, 255, 0, 0.1);
            border-radius: 5px;
        }

        .info-label {
            font-weight: bold;
            color: #00ff00;
        }

        .info-value {
            font-size: 24px;
            color: #00ff00;
            font-weight: bold;
            margin-top: 5px;
        }

        .next-piece {
            margin-top: 20px;
            padding: 10px;
            background: rgba(0, 255, 0, 0.1);
            border-radius: 5px;
        }

        .next-piece-canvas {
            border: 2px solid #00ff00;
            background-color: #000;
            display: block;
            margin-top: 10px;
        }

        .controls {
            margin-top: 20px;
            color: #00ff00;
            font-size: 14px;
        }

        .control-item {
            margin: 8px 0;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #00ff00;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover {
            background-color: #00cc00;
            transform: scale(1.05);
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 10px;
            border: 3px solid #ff0000;
            text-align: center;
            display: none;
            z-index: 1000;
        }

        .game-over.show {
            display: block;
        }

        .game-over h2 {
            color: #ff0000;
            font-size: 32px;
            margin-bottom: 20px;
        }

        .game-over p {
            color: #fff;
            font-size: 18px;
            margin: 10px 0;
        }

        .game-over button {
            background-color: #ff0000;
            color: #fff;
            margin-top: 20px;
        }

        .game-over button:hover {
            background-color: #cc0000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-section">
            <h1>테트리스</h1>
            <canvas id="tetrisCanvas" width="200" height="400"></canvas>
        </div>
        
        <div class="info-section">
            <div class="info-item">
                <div class="info-label">점수</div>
                <div class="info-value" id="score">0</div>
            </div>

            <div class="info-item">
                <div class="info-label">레벨</div>
                <div class="info-value" id="level">1</div>
            </div>

            <div class="info-item">
                <div class="info-label">라인</div>
                <div class="info-value" id="lines">0</div>
            </div>

            <div class="next-piece">
                <div class="info-label">다음 피스</div>
                <canvas id="nextCanvas" width="100" height="100" class="next-piece-canvas"></canvas>
            </div>

            <div class="controls">
                <div class="control-item"><strong>조작 방법:</strong></div>
                <div class="control-item">← → : 좌우 이동</div>
                <div class="control-item">↑ : 회전</div>
                <div class="control-item">↓ : 빠른 낙하</div>
                <div class="control-item">스페이스 : 일시정지</div>
            </div>

            <button id="pauseBtn">일시정지</button>
            <button id="restartBtn">다시 시작</button>
        </div>
    </div>

    <div class="game-over" id="gameOverModal">
        <h2>게임 오버!</h2>
        <p>최종 점수: <span id="finalScore">0</span></p>
        <p>라인 제거: <span id="finalLines">0</span></p>
        <button onclick="location.reload()">다시 시작</button>
    </div>

    <script src="main.js"></script>
</body>
</html>
